<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Code Generator</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        :root {
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
            --surface: #ffffff;
            --surface-alt: #f8f9fc;
            --border: #e5e7eb;
            --text: #111827;
            --text-muted: #6b7280;
            --radius: 1rem;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,.08);
            --shadow-lg: 0 20px 50px rgba(0,0,0,.1);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            background: var(--surface-alt);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text);
        }

        .main-card {
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: var(--radius);
            background: var(--accent);
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: .75rem;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -.025em;
        }

        .brand p {
            color: var(--text-muted);
            font-size: .875rem;
            margin: .25rem 0 0;
        }

        .form-control, .input-group-text, .form-select {
            border-color: var(--border);
            border-radius: .75rem;
            font-size: .9375rem;
        }

        .input-group > .form-control,
        .input-group > .input-group-text,
        .input-group > .btn {
            border-radius: .75rem;
        }

        .input-group > :not(:last-child) {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }

        .input-group > :not(:first-child) {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(13,110,253,.15);
        }

        .input-group-text {
            background: var(--surface-alt);
            color: var(--text-muted);
        }

        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .btn-generate {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: .75rem;
            padding: .5rem 1.25rem;
            font-weight: 600;
            font-size: .9375rem;
            transition: transform .15s, box-shadow .15s, opacity .15s;
        }

        .btn-generate:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(13,110,253,.35);
            color: #fff;
        }

        .btn-generate:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            opacity: .45;
            cursor: not-allowed;
        }

        .options-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .options-row .form-label {
            font-size: .8125rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: .25rem;
        }

        .divider {
            border: none;
            border-top: 1px dashed var(--border);
            margin: 1.5rem 0;
        }

        #resultSection {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity .45s ease, transform .45s ease;
            display: none;
        }

        #resultSection.show {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .qr-code-container {
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            position: relative;
        }

        #qrCodeImage {
            max-width: 100%;
            height: auto;
            border-radius: .5rem;
        }

        #downloadBtn {
            position: absolute;
            bottom: .75rem;
            right: .75rem;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            color: #fff;
            border: none;
            box-shadow: var(--shadow-sm);
            transition: transform .15s, box-shadow .15s;
        }

        #downloadBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(13,110,253,.3);
        }

        #downloadBtn i {
            margin: 0;
            font-size: 1.1rem;
        }

        .uri-section {
            margin-top: 1rem;
        }

        .uri-label {
            font-weight: 600;
            font-size: .8125rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: .375rem;
        }

        .spinner-border-sm {
            width: 1rem;
            height: 1rem;
            border-width: .15rem;
        }

        .alert {
            border-radius: .75rem;
            font-size: .875rem;
        }

        .github-link {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            font-size: .875rem;
            display: flex;
            align-items: center;
            gap: .4rem;
            opacity: .55;
            transition: opacity .2s;
            z-index: 10;
        }

        .github-link:hover {
            opacity: 1;
            color: var(--text);
        }

        .github-link i {
            font-size: 1.35rem;
        }

        @media (max-width: 576px) {
            body { padding: 1rem .75rem; }

            .github-link span { display: none; }
        }
    </style>
</head>
<body>
    <a href="https://github.com/marcominerva/QrCodeGenerator" target="_blank" class="github-link" aria-label="View source on GitHub">
        <i class="bi bi-github"></i>
        <span>GitHub</span>
    </a>

    <div class="main-card">
        <div class="brand">
            <div class="brand-icon"><i class="bi bi-qr-code"></i></div>
            <h1>QR Code Generator</h1>
            <p>Paste a link or type any text to generate a QR code</p>
        </div>

        <div class="mb-3">
            <div class="input-group input-group-lg">
                <span class="input-group-text">
                    <i class="bi bi-pencil-fill"></i>
                </span>
                <input type="text"
                       class="form-control form-control-lg"
                       id="contentInput"
                       placeholder="Enter your text here..."
                       autocomplete="off" />
            </div>
        </div>

        <div class="options-row mb-3">
            <div>
                <label for="sizeInput" class="form-label">Size</label>
                <input type="number"
                       class="form-control"
                       id="sizeInput"
                       min="1"
                       max="100"
                       value="3"
                       style="width: 80px;" />
            </div>
            <div class="pt-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="drawBorderCheck" checked />
                    <label class="form-check-label" for="drawBorderCheck">Draw border</label>
                </div>
            </div>
            <div class="ms-auto pt-4">
                <button type="button"
                        class="btn btn-generate"
                        id="generateBtn"
                        disabled>
                    <i class="bi bi-qr-code-scan me-1"></i>
                    <span id="generateBtnText">Generate</span>
                    <span id="generateBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                </button>
            </div>
        </div>

        <div id="alertSection"></div>

        <div id="resultSection">
            <hr class="divider" />

            <div class="qr-code-container">
                <img id="qrCodeImage" src="" alt="QR Code" />
                <button type="button"
                        class="btn"
                        id="downloadBtn"
                        title="Download QR Code">
                    <i class="bi bi-download"></i>
                </button>
            </div>

            <div class="uri-section">
                <div class="uri-label">
                    <i class="bi bi-globe2 me-1"></i>Endpoint URI
                </div>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-link-45deg"></i>
                    </span>
                    <input type="text"
                           class="form-control"
                           id="endpointUri"
                           readonly />
                    <button type="button"
                            class="btn btn-outline-primary"
                            id="copyBtn"
                            style="border-color: var(--border); color: var(--accent);">
                        <i class="bi bi-clipboard"></i>
                        <span id="copyBtnText" class="ms-1">Copy</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const contentInput = document.getElementById('contentInput');
        const sizeInput = document.getElementById('sizeInput');
        const drawBorderCheck = document.getElementById('drawBorderCheck');
        const generateBtn = document.getElementById('generateBtn');
        const generateBtnText = document.getElementById('generateBtnText');
        const generateBtnSpinner = document.getElementById('generateBtnSpinner');
        const resultSection = document.getElementById('resultSection');
        const qrCodeImage = document.getElementById('qrCodeImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const endpointUri = document.getElementById('endpointUri');
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnText = document.getElementById('copyBtnText');
        const alertSection = document.getElementById('alertSection');

        contentInput.addEventListener('input', () => {
            const hasContent = contentInput.value.trim().length > 0;
            generateBtn.disabled = !hasContent;
        });

        generateBtn.addEventListener('click', generateQRCode);

        contentInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !generateBtn.disabled) {
                generateQRCode();
            }
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = qrCodeImage.src;
            link.download = 'qrcode.png';
            link.click();
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(endpointUri.value);
                
                const icon = copyBtn.querySelector('i');
                icon.className = 'bi bi-check-lg';
                copyBtnText.textContent = 'Copied';
                
                setTimeout(() => {
                    icon.className = 'bi bi-clipboard';
                    copyBtnText.textContent = 'Copy';
                }, 3000);
            } catch (err) {
                showAlert('Failed to copy URI', 'danger');
            }
        });

        function generateQRCode() {
            const content = contentInput.value.trim();
            const size = parseInt(sizeInput.value);
            const drawBorder = drawBorderCheck.checked;

            generateBtn.disabled = true;
            generateBtnText.textContent = 'Generating...';
            generateBtnSpinner.classList.remove('d-none');
            alertSection.innerHTML = '';

            const baseUrl = window.location.origin;
            const params = new URLSearchParams({
                content: content,
                size: size,
                drawBorder: drawBorder
            });
            const uri = `${baseUrl}/qrcode?${params.toString()}`;

            qrCodeImage.src = uri;
            endpointUri.value = uri;

            qrCodeImage.onload = () => {
                const hasContent = contentInput.value.trim().length > 0;
                generateBtn.disabled = !hasContent;
                generateBtnText.textContent = 'Generate';
                generateBtnSpinner.classList.add('d-none');

                resultSection.classList.add('show');
            };

            qrCodeImage.onerror = () => {
                const hasContent = contentInput.value.trim().length > 0;
                generateBtn.disabled = !hasContent;
                generateBtnText.textContent = 'Generate';
                generateBtnSpinner.classList.add('d-none');

                showAlert('Failed to generate QR Code. Please try again.', 'danger');
                resultSection.classList.remove('show');
            };
        }

        function showAlert(message, type) {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertSection.innerHTML = alertHtml;

            setTimeout(() => {
                const alert = alertSection.querySelector('.alert');
                if (alert) {
                    const bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                }
            }, 5000);
        }
    </script>
</body>
</html>
